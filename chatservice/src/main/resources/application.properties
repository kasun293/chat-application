spring.application.name=chatservice
server.port=8080

# Force Hibernate to store dates in UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Ensure Jackson (JSON) formats dates as ISO strings instead of timestamps
#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

logging.level.org.springframework=WARN
# Example for MySQL
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect


spring.datasource.url=jdbc:mysql://localhost:3306/chat?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.liquibase.change-log=classpath:db/liquibase/master.xml

#logging.level.org.springframework.security = TRACE
#logging.level.org.springframework.security=DEBUG


spring.jpa.hibernate.ddl-auto = update

app.jwt-secret=daf66e01593f61a15b857cf433aae03a005812b31234e149036bcc8dee755dbb
app.jwt-expiration-milliseconds=604800000

spring.main.allow-bean-definition-overriding=true

spring.jpa.open-in-view=false

